name: Propagate guardrail version

on:
  push:
    branches:
      - main
    paths:
      - '.cursor/guardrail-version'
      - 'guardrail-layers.json'
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Releases (mechanism A)

concurrency:
  group: propagate-guardrail-version
  cancel-in-progress: false

jobs:
  # ── Mechanism A: create/update GitHub Release ─────────────────────────────
  release:
    name: Tag GitHub Release guardrail-vX.Y.Z
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read version
        id: read_version
        run: |
          VERSION=$(cat .cursor/guardrail-version | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Guardrail version: ${VERSION}"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.read_version.outputs.version }}
        run: |
          TAG="guardrail-v${VERSION}"
          MANIFEST_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/guardrail-layers.json"

          NOTES="## Guardrail version ${VERSION}

          Released: $(date -u +%Y-%m-%d)

          ### What changed
          See [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/commits/main) or the \`schemaChangelog\` field in \`guardrail-layers.json\`.

          ### Downstream consumption
          Vendor the manifest directly:
          \`\`\`
          curl -o src/data/guardrail-layers.json ${MANIFEST_URL}
          \`\`\`

          Raw manifest URL (for drift checks):
          ${MANIFEST_URL}

          ---
          _Auto-generated by propagate-guardrail-version workflow._"

          # Delete existing tag/release for this version if it exists (idempotent re-run).
          gh release delete "${TAG}" --repo "${GITHUB_REPOSITORY}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Guardrail version ${VERSION}" \
            --notes "${NOTES}" \
            guardrail-layers.json

          echo "Created release ${TAG}"

  # ── Mechanism B: notify downstream repos ──────────────────────────────────
  dispatch:
    name: Dispatch to downstream repos
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read  # override workflow-level write — dispatch only calls the API, never writes the repo
    strategy:
      matrix:
        # Add downstream repos here as the ecosystem grows.
        repo:
          - AGM82/throughline
    steps:
      - name: Dispatch repository_dispatch to downstream repo
        env:
          DISPATCH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          # Skip silently if the secret is not configured — mechanism A still works.
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "DOWNSTREAM_DISPATCH_TOKEN not set — skipping dispatch for ${TARGET_REPO}. Mechanism A (Release) still active."
            exit 0
          fi
          MANIFEST_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/guardrail-layers.json"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/guardrail-v${VERSION}"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d "{\"event_type\":\"guardrail-version-bump\",\"client_payload\":{\"version\":\"${VERSION}\",\"manifestUrl\":\"${MANIFEST_URL}\",\"releaseUrl\":\"${RELEASE_URL}\",\"sourceRepo\":\"${GITHUB_REPOSITORY}\"}}")

          if [ "$RESPONSE" = "204" ]; then
            echo "Dispatched guardrail-version-bump to ${TARGET_REPO} (v${VERSION})"
          else
            echo "Dispatch to ${TARGET_REPO} returned HTTP ${RESPONSE} — check DOWNSTREAM_DISPATCH_TOKEN scope"
            exit 1
          fi
