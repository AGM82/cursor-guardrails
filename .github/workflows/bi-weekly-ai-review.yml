name: Bi-weekly AI review

on:
  schedule:
    # Every Monday at 08:00 UTC. Cron has no "Nth weekday of month" syntax — an
    # earlier version tried to fake it with `0 8 1-7 * 1` / `0 8 15-21 * 1`, but
    # POSIX cron treats day-of-month and day-of-week as OR (not AND) once both
    # fields are restricted, so those fired every day 1-7 and 15-21, not just
    # the Mondays inside those ranges. The "Determine review type" step below
    # now does the real date math and skips on Mondays that aren't the 1st or
    # 3rd of the month.
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Review type'
        required: false
        default: 'biweekly'
        type: choice
        options:
          - biweekly
          - cursor
          - security
          - focused
      focus_topic:
        description: 'Tool or topic to investigate (used when review_type=focused)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — skip API call, use mock data'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: bi-weekly-ai-review
  cancel-in-progress: false

jobs:
  ai-review:
    name: AI pattern review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Scheduled runs carry no `inputs` and now fire every Monday (see the
      # `on.schedule` comment above), so this step does the real "which Monday
      # is it" date math and sets `skip=true` on the 2nd/4th/5th Monday of the
      # month — every later step is gated on `skip != 'true'`.
      #
      # github/inputs context values are passed via `env:` and read as quoted
      # shell variables rather than interpolated directly into `run:` — even
      # though these particular values are constrained (a `type: choice` enum),
      # interpolating `${{ }}` straight into a shell script is a generic
      # injection pattern Semgrep's run-shell-injection rule flags on sight,
      # regardless of how trusted the actual value is.
      - name: Determine review type
        id: determine_type
        env:
          INPUT_REVIEW_TYPE: ${{ inputs.review_type }}
        run: |
          if [ -n "$INPUT_REVIEW_TYPE" ]; then
            echo "review_type=$INPUT_REVIEW_TYPE" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # %-d/%-m (no leading zero) avoid bash treating e.g. "08" as an
          # invalid octal literal in the numeric comparisons below.
          DAY=$(date -u +%-d)
          MONTH=$(date -u +%-m)

          if [ "$DAY" -le 7 ]; then
            case "$MONTH" in
              1|4|7|10) echo "review_type=security" >> "$GITHUB_OUTPUT" ;;
              *) echo "review_type=biweekly" >> "$GITHUB_OUTPUT" ;;
            esac
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$DAY" -ge 15 ] && [ "$DAY" -le 21 ]; then
            echo "review_type=biweekly" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "review_type=skipped" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run AI review
        id: ai_review
        if: steps.determine_type.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_TYPE: ${{ steps.determine_type.outputs.review_type }}
          FOCUS_TOPIC: ${{ inputs.focus_topic || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          node .github/scripts/ai-review.mjs > ai-suggestions.json
          echo "suggestion_count=$(node -e "const d=require('./ai-suggestions.json'); console.log(d.suggestions.length)")" >> $GITHUB_OUTPUT
          echo "run_date=$(node -e "const d=require('./ai-suggestions.json'); console.log(d.runDate)")" >> $GITHUB_OUTPUT
          echo "review_type=$(node -e "const d=require('./ai-suggestions.json'); console.log(d.reviewType)")" >> $GITHUB_OUTPUT

      - name: Build issue body and manage issue
        if: steps.determine_type.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SUGGESTION_COUNT: ${{ steps.ai_review.outputs.suggestion_count }}
          RUN_DATE: ${{ steps.ai_review.outputs.run_date }}
          REVIEW_TYPE: ${{ steps.ai_review.outputs.review_type }}
          FOCUS_TOPIC: ${{ inputs.focus_topic || '' }}
        run: |
          COUNT="$SUGGESTION_COUNT"

          # Build markdown table from suggestions (fields escaped to prevent markdown/injection issues)
          TABLE=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('./ai-suggestions.json', 'utf8'));
            const esc = v => String(v ?? '').replace(/\r?\n|\r/g, ' ').replace(/\|/g, '\\\\|').replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 200);
            const rows = d.suggestions.map(s =>
              '| ' + [s.area, s.title, s.confidence, s.stability, s.effort].map(esc).join(' | ') + ' |'
            ).join('\n');
            console.log('| Area | Title | Confidence | Stability | Effort |\n|------|-------|------------|-----------|--------|\n' + rows);
          ")

          WATCHLIST=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('./ai-suggestions.json', 'utf8'));
            if (!d.watchlist || !d.watchlist.length) { console.log('_No watchlist items._'); process.exit(0); }
            const esc = v => String(v ?? '').replace(/\r?\n|\r/g, ' ').replace(/\|/g, '\\\\|').replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 200);
            const rows = d.watchlist.map(s => '- **' + esc(s.title) + '** (' + esc(s.area) + ') — ' + esc(s.reason)).join('\n');
            console.log(rows);
          ")

          # Embed machine-readable data for playbook.html — only the fields it reads
          # (runDate, reviewType, focusTopic, suggestions, watchlist). The full file also
          # carries updatedWatchlist, which duplicates every suggestion and is never read here;
          # embedding it pushed the issue body past GitHub's 65536-char limit. We also trim
          # suggestions if the projection is still large, so the body can never exceed the cap.
          DATA_JSON=$(node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('./ai-suggestions.json', 'utf8'));
            const slim = { runDate: d.runDate, reviewType: d.reviewType, suggestions: (d.suggestions || []).slice(), watchlist: d.watchlist || [] };
            if (d.focusTopic) slim.focusTopic = d.focusTopic;
            const BUDGET = 40000;
            while (JSON.stringify(slim).length > BUDGET && slim.suggestions.length > 0) {
              slim.suggestions.pop();
              slim.truncated = true;
            }
            console.log(JSON.stringify(slim));
          ")

          ISSUE_BODY="## AI guardrail review — ${RUN_DATE} (${REVIEW_TYPE})

          <!-- ai-review-data
          ${DATA_JSON}
          -->

          ## Actionable suggestions (${COUNT})

          ${TABLE}

          ## Watchlist — low-confidence signals to monitor

          ${WATCHLIST}

          ---
          Open [playbook.html](https://github.com/${GITHUB_REPOSITORY}/blob/main/playbook.html) → AI Suggestions tab for the interactive view.

          _Generated automatically by the bi-weekly-ai-review workflow using Anthropic claude-sonnet-4-6._"

          if [ "$DRY_RUN" = "true" ]; then
            echo "=== DRY RUN: ${COUNT} suggestion(s) ==="
            echo "$ISSUE_BODY"
            exit 0
          fi

          if [ -n "$FOCUS_TOPIC" ] && [ "$REVIEW_TYPE" = "focused" ]; then
            # Focused runs get their own label so they never compete with the
            # rolling biweekly/security issue for the playbook's "newest open
            # ai-suggestions issue" lookup — each opens a new issue.
            TITLE_SUFFIX="investigation: ${FOCUS_TOPIC} — ${RUN_DATE}"
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "[ai-review] ${TITLE_SUFFIX}" \
              --body "$ISSUE_BODY" \
              --label "ai-investigation"
            echo "Created focused investigation issue for: ${FOCUS_TOPIC}"
          else
            LABEL="ai-suggestions"
            TITLE_PREFIX="[ai-review]"
            EXISTING=$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --label "$LABEL" \
              --state open \
              --limit 1 \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$EXISTING" ]; then
              # Edit the body (not just comment) so the machine-readable
              # <!-- ai-review-data --> block playbook.html reads is always
              # current — gh issue comment alone leaves issue.body stale.
              gh issue edit "$EXISTING" \
                --repo "$GITHUB_REPOSITORY" \
                --body "$ISSUE_BODY"
              gh issue comment "$EXISTING" \
                --repo "$GITHUB_REPOSITORY" \
                --body "Updated — see top of issue for the latest ${REVIEW_TYPE} review (${RUN_DATE})."
              echo "Updated existing issue #$EXISTING"
            else
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "${TITLE_PREFIX} ${REVIEW_TYPE} review — ${RUN_DATE}" \
                --body "$ISSUE_BODY" \
                --label "$LABEL"
              echo "Created new ai-suggestions issue"
            fi
          fi

      - name: Persist watchlist
        if: steps.determine_type.outputs.skip != 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_TYPE: ${{ steps.ai_review.outputs.review_type }}
        run: |
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('./ai-suggestions.json', 'utf8'));
            fs.writeFileSync('.github/ai-review-watchlist.json', JSON.stringify(d.updatedWatchlist || [], null, 2) + '\n');
          "

          if [ -z "$(git status --porcelain .github/ai-review-watchlist.json)" ]; then
            echo "Watchlist unchanged — nothing to persist."
            exit 0
          fi

          BRANCH="chore/ai-watchlist-sync"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .github/ai-review-watchlist.json
          printf -v COMMIT_MSG 'chore(ai-review): sync watchlist from %s run\n\nAuto-generated by bi-weekly-ai-review. Tracks recurring low-confidence\nsignals across runs (seenCount, lastSeen) so they can be escalated and\nfed back into the next prompt instead of resetting every run.' \
            "${REVIEW_TYPE}"
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            printf -v PR_BODY '## Auto-generated by bi-weekly-ai-review\n\nKeeps `.github/ai-review-watchlist.json` in sync with the run'"'"'s cumulative\nlow-confidence signal tracker. Data only — no application code changes.\nSafe to merge.\n\n_Auto-created by bi-weekly-ai-review workflow._'
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore(ai-review): sync watchlist" \
              --body "$PR_BODY" \
              --head "$BRANCH" \
              --base main \
              --label "chore"
            echo "Opened watchlist sync PR."
          else
            echo "Updated existing watchlist sync PR #$EXISTING_PR."
          fi

      - name: Summary
        if: steps.determine_type.outputs.skip != 'true'
        env:
          SUMMARY_DATE: ${{ steps.ai_review.outputs.run_date }}
          SUMMARY_TYPE: ${{ steps.ai_review.outputs.review_type }}
          SUMMARY_COUNT: ${{ steps.ai_review.outputs.suggestion_count }}
        run: |
          echo "### AI review complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run date: ${SUMMARY_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "- Review type: ${SUMMARY_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "- Actionable suggestions: ${SUMMARY_COUNT}" >> $GITHUB_STEP_SUMMARY

      - name: Skipped summary
        if: steps.determine_type.outputs.skip == 'true'
        run: |
          echo "### AI review skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Today is a Monday, but not the 1st or 3rd of the month — no review is scheduled for this week." >> $GITHUB_STEP_SUMMARY
