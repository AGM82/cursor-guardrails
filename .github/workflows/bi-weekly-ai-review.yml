name: Bi-weekly AI review

on:
  schedule:
    # Every other Monday at 08:00 UTC (weeks 1, 3 of each month).
    - cron: '0 8 1-7 * 1'    # First Monday of the month — full bi-weekly review
    - cron: '0 8 15-21 * 1'  # Third Monday of the month — full bi-weekly review
    # First Monday of each quarter at 09:00 UTC — security deep-dive.
    - cron: '0 9 1-7 1,4,7,10 1'
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Review type'
        required: false
        default: 'biweekly'
        type: choice
        options:
          - biweekly
          - cursor
          - security
          - focused
      focus_topic:
        description: 'Tool or topic to investigate (used when review_type=focused)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — skip API call, use mock data'
        required: false
        default: false
        type: boolean

permissions:
  issues: write

concurrency:
  group: bi-weekly-ai-review
  cancel-in-progress: false

jobs:
  ai-review:
    name: AI pattern review (${{ inputs.review_type || 'biweekly' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Run AI review
        id: ai_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_TYPE: ${{ inputs.review_type || 'biweekly' }}
          FOCUS_TOPIC: ${{ inputs.focus_topic || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          node .github/scripts/ai-review.mjs > ai-suggestions.json
          echo "suggestion_count=$(node -e "const d=require('./ai-suggestions.json'); console.log(d.suggestions.length)")" >> $GITHUB_OUTPUT
          echo "run_date=$(node -e "const d=require('./ai-suggestions.json'); console.log(d.runDate)")" >> $GITHUB_OUTPUT
          echo "review_type=$(node -e "const d=require('./ai-suggestions.json'); console.log(d.reviewType)")" >> $GITHUB_OUTPUT

      - name: Build issue body and manage issue
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SUGGESTION_COUNT: ${{ steps.ai_review.outputs.suggestion_count }}
          RUN_DATE: ${{ steps.ai_review.outputs.run_date }}
          REVIEW_TYPE: ${{ steps.ai_review.outputs.review_type }}
          FOCUS_TOPIC: ${{ inputs.focus_topic || '' }}
        run: |
          COUNT="$SUGGESTION_COUNT"

          # Build markdown table from suggestions (fields escaped to prevent markdown/injection issues)
          TABLE=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('./ai-suggestions.json', 'utf8'));
            const esc = v => String(v ?? '').replace(/\r?\n|\r/g, ' ').replace(/\|/g, '\\\\|').replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 200);
            const rows = d.suggestions.map(s =>
              '| ' + [s.area, s.title, s.confidence, s.stability, s.effort].map(esc).join(' | ') + ' |'
            ).join('\n');
            console.log('| Area | Title | Confidence | Stability | Effort |\n|------|-------|------------|-----------|--------|\n' + rows);
          ")

          WATCHLIST=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('./ai-suggestions.json', 'utf8'));
            if (!d.watchlist || !d.watchlist.length) { console.log('_No watchlist items._'); process.exit(0); }
            const esc = v => String(v ?? '').replace(/\r?\n|\r/g, ' ').replace(/\|/g, '\\\\|').replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 200);
            const rows = d.watchlist.map(s => '- **' + esc(s.title) + '** (' + esc(s.area) + ') — ' + esc(s.reason)).join('\n');
            console.log(rows);
          ")

          # Embed machine-readable data for playbook.html — only the fields it reads
          # (runDate, reviewType, focusTopic, suggestions, watchlist). The full file also
          # carries updatedWatchlist, which duplicates every suggestion and is never read here;
          # embedding it pushed the issue body past GitHub's 65536-char limit. We also trim
          # suggestions if the projection is still large, so the body can never exceed the cap.
          DATA_JSON=$(node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('./ai-suggestions.json', 'utf8'));
            const slim = { runDate: d.runDate, reviewType: d.reviewType, suggestions: (d.suggestions || []).slice(), watchlist: d.watchlist || [] };
            if (d.focusTopic) slim.focusTopic = d.focusTopic;
            const BUDGET = 40000;
            while (JSON.stringify(slim).length > BUDGET && slim.suggestions.length > 0) {
              slim.suggestions.pop();
              slim.truncated = true;
            }
            console.log(JSON.stringify(slim));
          ")

          ISSUE_BODY="## AI guardrail review — ${RUN_DATE} (${REVIEW_TYPE})

          <!-- ai-review-data
          ${DATA_JSON}
          -->

          ## Actionable suggestions (${COUNT})

          ${TABLE}

          ## Watchlist — low-confidence signals to monitor

          ${WATCHLIST}

          ---
          Open [playbook.html](https://github.com/${GITHUB_REPOSITORY}/blob/main/playbook.html) → AI Suggestions tab for the interactive view.

          _Generated automatically by the bi-weekly-ai-review workflow using Anthropic claude-sonnet-4-5._"

          if [ "$DRY_RUN" = "true" ]; then
            echo "=== DRY RUN: ${COUNT} suggestion(s) ==="
            echo "$ISSUE_BODY"
            exit 0
          fi

          LABEL="ai-suggestions"

          if [ -n "$FOCUS_TOPIC" ] && [ "$REVIEW_TYPE" = "focused" ]; then
            TITLE_SUFFIX="investigation: ${FOCUS_TOPIC} — ${RUN_DATE}"
            # Focused runs always open a new issue (not appended to the rolling one).
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "[ai-review] ${TITLE_SUFFIX}" \
              --body "$ISSUE_BODY" \
              --label "$LABEL"
            echo "Created focused investigation issue for: ${FOCUS_TOPIC}"
          else
            TITLE_PREFIX="[ai-review]"
            EXISTING=$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --label "$LABEL" \
              --state open \
              --limit 1 \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" \
                --repo "$GITHUB_REPOSITORY" \
                --body "$ISSUE_BODY"
              echo "Updated existing issue #$EXISTING"
            else
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "${TITLE_PREFIX} ${REVIEW_TYPE} review — ${RUN_DATE}" \
                --body "$ISSUE_BODY" \
                --label "$LABEL"
              echo "Created new ai-suggestions issue"
            fi
          fi

      - name: Summary
        env:
          SUMMARY_DATE: ${{ steps.ai_review.outputs.run_date }}
          SUMMARY_TYPE: ${{ steps.ai_review.outputs.review_type }}
          SUMMARY_COUNT: ${{ steps.ai_review.outputs.suggestion_count }}
        run: |
          echo "### AI review complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run date: ${SUMMARY_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "- Review type: ${SUMMARY_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "- Actionable suggestions: ${SUMMARY_COUNT}" >> $GITHUB_STEP_SUMMARY
